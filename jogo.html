<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Defender</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

body{
margin:0;
overflow:hidden;
background:#050505;
font-family:'Orbitron',sans-serif;
color:white;
}

#gameCanvas{
display:block;
border-left:2px solid #00f3ff;
border-right:2px solid #00f3ff;
box-shadow:0 0 20px #00f3ff;
}

#ui{
position:absolute;
top:20px;
left:20px;
z-index:10;
}

h1{
margin:0;
font-size:24px;
color:#00f3ff;
text-shadow:0 0 10px #00f3ff;
}

#scoreEl{
font-size:18px;
color:#ff00ff;
text-shadow:0 0 10px #ff00ff;
}

#missedEl{
font-size:18px;
color:#ff4444;
text-shadow:0 0 10px #ff4444;
}

#startScreen{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
background:rgba(0,0,0,0.85);
padding:40px;
border:2px solid #00f3ff;
box-shadow:0 0 30px #00f3ff;
}

button{
background:transparent;
color:#00f3ff;
border:2px solid #00f3ff;
padding:15px 30px;
font-family:'Orbitron',sans-serif;
font-size:18px;
cursor:pointer;
transition:.3s;
text-transform:uppercase;
}

button:hover{
background:#00f3ff;
color:black;
}
</style>
</head>

<body>

<div id="ui">
<h1>NEON DEFENDER</h1>
<div id="scoreEl">Score: 0</div>
<div id="missedEl">Missed: 0</div>
</div>

<div id="startScreen">
<h1 style="font-size:40px;margin-bottom:20px;">SYSTEM READY</h1>
<p>WASD ou SETAS para mover | ESPAÇO para atirar</p>
<br>
<button id="startBtn">INICIAR</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
let audioContext = null;

function initAudio() {
    if (audioContext) return;
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
}

function playShootSound() {
    if (!audioContext) return;
    
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    
    oscillator.type = 'sawtooth';
    oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
    oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.1);
    
    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
    
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    oscillator.start();
    oscillator.stop(audioContext.currentTime + 0.1);
}

let bgmOscillator = null;
let bgmGain = null;

function startBackgroundMusic() {
    if (!audioContext || bgmOscillator) return;
    
    bgmOscillator = audioContext.createOscillator();
    bgmGain = audioContext.createGain();
    const filter = audioContext.createBiquadFilter();
    
    bgmOscillator.type = 'sine';
    bgmOscillator.frequency.value = 60;
    
    filter.type = 'lowpass';
    filter.frequency.value = 300;
    
    bgmGain.gain.setValueAtTime(0.02, audioContext.currentTime);
    
    bgmOscillator.connect(filter);
    filter.connect(bgmGain);
    bgmGain.connect(audioContext.destination);
    
    bgmOscillator.start();
    
    let time = audioContext.currentTime;
    for (let i = 0; i < 100; i++) {
        bgmOscillator.frequency.setValueAtTime(60 + Math.sin(i * 0.5) * 15, time + i * 0.25);
    }
}

function stopBackgroundMusic() {
    if (bgmOscillator) {
        bgmOscillator.stop();
        bgmOscillator = null;
    }
}

const canvas = document.getElementById("gameCanvas")
const ctx = canvas.getContext("2d")

canvas.width = innerWidth
canvas.height = innerHeight

const scoreEl = document.getElementById("scoreEl")
const missedEl = document.getElementById("missedEl")
const startBtn = document.getElementById("startBtn")
const startScreen = document.getElementById("startScreen")

let animationId
let spawnInterval

let score = 0
let missed = 0
const maxMissed = 10

let gameActive = false

class Player{
constructor(){
this.width = 40
this.height = 40
this.x = canvas.width/2 - 20
this.y = canvas.height - 100
this.speed = 7
this.velocity = {x:0,y:0}
}

draw(){

ctx.save()
ctx.shadowBlur = 20
ctx.shadowColor = "#00f3ff"
ctx.fillStyle = "#00f3ff"

ctx.beginPath()
ctx.moveTo(this.x + this.width/2, this.y)
ctx.lineTo(this.x + this.width, this.y + this.height)
ctx.lineTo(this.x, this.y + this.height)
ctx.closePath()
ctx.fill()

ctx.restore()

}

update(){

if(keys.ArrowRight || keys.d) this.velocity.x = this.speed
else if(keys.ArrowLeft || keys.a) this.velocity.x = -this.speed
else this.velocity.x = 0

if(keys.ArrowUp || keys.w) this.velocity.y = -this.speed
else if(keys.ArrowDown || keys.s) this.velocity.y = this.speed
else this.velocity.y = 0

this.x += this.velocity.x
this.y += this.velocity.y

if(this.x < 0) this.x = 0
if(this.x + this.width > canvas.width) this.x = canvas.width - this.width

if(this.y < 0) this.y = 0
if(this.y + this.height > canvas.height) this.y = canvas.height - this.height

this.draw()

}

}

class Projectile{

constructor(x,y){
this.x = x
this.y = y
this.radius = 4
this.velocity = 10
}

draw(){

ctx.save()
ctx.shadowBlur = 10
ctx.shadowColor = "#ff00ff"

ctx.fillStyle = "white"
ctx.beginPath()
ctx.arc(this.x,this.y,this.radius,0,Math.PI*2)
ctx.fill()

ctx.restore()

}

update(){

this.y -= this.velocity
this.draw()

}

}

class Enemy{

constructor(x,y,radius,color,velocity){
this.x = x
this.y = y
this.radius = radius
this.color = color
this.velocity = velocity
}

draw(){

ctx.save()
ctx.shadowBlur = 20
ctx.shadowColor = this.color
ctx.strokeStyle = this.color
ctx.lineWidth = 3

ctx.beginPath()

for(let i=0;i<6;i++){
ctx.lineTo(
this.x + this.radius * Math.cos(i * Math.PI/3),
this.y + this.radius * Math.sin(i * Math.PI/3)
)
}

ctx.closePath()
ctx.stroke()

ctx.restore()

}

update(){
this.y += this.velocity
this.draw()
}

}

class Particle{

constructor(x,y,radius,color,velocity){
this.x = x
this.y = y
this.radius = radius
this.color = color
this.velocity = velocity
this.alpha = 1
}

draw(){

ctx.save()
ctx.globalAlpha = this.alpha
ctx.fillStyle = this.color

ctx.beginPath()
ctx.arc(this.x,this.y,this.radius,0,Math.PI*2)
ctx.fill()

ctx.restore()

}

update(){

this.x += this.velocity.x
this.y += this.velocity.y
this.alpha -= 0.02
this.draw()

}

}

let player
let projectiles = []
let enemies = []
let particles = []

let keys = {
ArrowUp:false,
ArrowDown:false,
ArrowLeft:false,
ArrowRight:false,
w:false,
a:false,
s:false,
d:false
}

function init(){

player = new Player()
projectiles = []
enemies = []
particles = []

score = 0
missed = 0

scoreEl.innerHTML = "Score: 0"
missedEl.innerHTML = "Missed: 0"

gameActive = true

}

function spawnEnemies(){

spawnInterval = setInterval(()=>{

const radius = Math.random()*15 + 15
const x = Math.random()*(canvas.width-radius*2)+radius
const y = -50

const color = `hsl(${Math.random()*60+300},100%,50%)`
const velocity = Math.random()*2 + 1

enemies.push(new Enemy(x,y,radius,color,velocity))

},1000)

}

function animate(){

if(!gameActive) return

animationId = requestAnimationFrame(animate)

ctx.fillStyle = "rgba(5,5,5,0.3)"
ctx.fillRect(0,0,canvas.width,canvas.height)

player.update()

particles.forEach((particle,i)=>{
if(particle.alpha <=0) particles.splice(i,1)
else particle.update()
})

projectiles.forEach((projectile,pIndex)=>{

projectile.update()

if(projectile.y < 0){
projectiles.splice(pIndex,1)
}

})

enemies.forEach((enemy,eIndex)=>{

enemy.update()

if(enemy.y - enemy.radius > canvas.height){

enemies.splice(eIndex,1)

missed++
missedEl.innerHTML = "Missed: " + missed

if(missed >= maxMissed){

gameActive = false
stopBackgroundMusic()
cancelAnimationFrame(animationId)
clearInterval(spawnInterval)

startScreen.style.display="block"

startScreen.innerHTML = `
<h1>GAME OVER</h1>
<p>Score: ${score}</p>
<p>Inimigos Perdidos: ${missed}</p>
<button onclick="restartGame()">REINICIAR</button>
`

}

}

const dist = Math.hypot(
player.x + player.width/2 - enemy.x,
player.y + player.height/2 - enemy.y
)

if(dist < enemy.radius + player.width/2){

gameActive = false
stopBackgroundMusic()
cancelAnimationFrame(animationId)
clearInterval(spawnInterval)

startScreen.style.display="block"

startScreen.innerHTML=`
<h1>SYSTEM FAILURE</h1>
<p>Score: ${score}</p>
<button onclick="restartGame()">REINICIAR</button>
`

}

projectiles.forEach((projectile,pIndex)=>{

const dist = Math.hypot(
projectile.x - enemy.x,
projectile.y - enemy.y
)

if(dist < enemy.radius + projectile.radius){

for(let i=0;i<enemy.radius*2;i++){

particles.push(
new Particle(
projectile.x,
projectile.y,
Math.random()*3,
enemy.color,
{
x:(Math.random()-0.5)*6,
y:(Math.random()-0.5)*6
}
)
)

}

score += 100
scoreEl.innerHTML = "Score: " + score

enemies.splice(eIndex,1)
projectiles.splice(pIndex,1)

}

})

})

}

window.addEventListener("keydown",e=>{

if(keys.hasOwnProperty(e.key)){
keys[e.key]=true
}

if(e.key === " " && gameActive){
projectiles.push(
new Projectile(
player.x + player.width/2,
player.y
)
)
playShootSound()
}

})

window.addEventListener("keyup",e=>{

if(keys.hasOwnProperty(e.key)){
keys[e.key]=false
}

})

startBtn.onclick = ()=>{

startScreen.style.display="none"

initAudio()
startBackgroundMusic()

init()
spawnEnemies()
animate()

}

function restartGame(){

startScreen.style.display="none"

init()
spawnEnemies()
animate()
stopBackgroundMusic()
startBackgroundMusic()

}

window.addEventListener("resize",()=>{
canvas.width = innerWidth
canvas.height = innerHeight
})

document.body.addEventListener('click', function initAudioOnClick() {
    initAudio();
    document.body.removeEventListener('click', initAudioOnClick);
}, { once: true });

</script>
</body>
</html>
